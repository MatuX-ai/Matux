# iMato Cloud - Kubernetes Secret 配置
# ⚠️ 注意：实际环境中应使用加密的 Secret 或外部密钥管理（如 AWS Secrets Manager）

apiVersion: v1
kind: Secret
metadata:
  name: imato-secrets
  namespace: imato-cloud
  labels:
    app: imato
type: Opaque
stringData:
  # 数据库连接 URL（包含密码）
  DATABASE_URL: "postgresql://imato:YourSecurePassword123@imato-postgres:5432/imato_cloud"

  # Redis 连接 URL（包含密码）
  REDIS_URL: "redis://:YourRedisPassword456@imato-redis:6379/0"

  # JWT 密钥（建议使用强随机字符串）
  SECRET_KEY: "your-super-secret-key-change-this-in-production-min-32-chars"

  # API 密钥（如果调用第三方服务）
  OPENAI_API_KEY: "sk-your-openai-api-key-here"

  # 邮件服务配置
  SMTP_USERNAME: "noreply@imato.cloud"
  SMTP_PASSWORD: "your-smtp-password"

  # 对象存储配置（如果使用 S3 等）
  AWS_ACCESS_KEY_ID: "your-aws-access-key"
  AWS_SECRET_ACCESS_KEY: "your-aws-secret-key"
  AWS_S3_BUCKET: "imato-uploads"

  # 支付配置（如果使用支付功能）
  ALIPAY_APP_ID: "your-alipay-app-id"
  ALIPAY_PRIVATE_KEY: "your-alipay-private-key"
  WECHAT_PAY_MCH_ID: "your-wechat-merchant-id"
  WECHAT_PAY_API_KEY: "your-wechat-api-key"

---
# TLS Secret（证书）
# 实际应使用 cert-manager 自动申请和管理
apiVersion: v1
kind: Secret
metadata:
  name: imato-tls-secret
  namespace: imato-cloud
  labels:
    app: imato
type: kubernetes.io/tls
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    MIID...（替换为实际证书内容）
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    MIIE...（替换为实际私钥内容）
    -----END PRIVATE KEY-----

---
# Docker Registry Secret（如果使用私有镜像仓库）
apiVersion: v1
kind: Secret
metadata:
  name: imato-registry-secret
  namespace: imato-cloud
  labels:
    app: imato
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: eyJhdXRocyI6eyJyZWdpc3RyeS5leGFtcGxlLmNvbSI6eyJ1c2VybmFtZSI6InVzZXIiLCJwYXNzd29yZCI6InBhc3MiLCJlbWFpbCI6InVzZXJAZXhhbXBsZS5jb20iLCJhdXRoIjoiZFhObGNqcHdZWE56In19fQ==

---
# Basic Auth Secret（用于 Ingress 认证，可选）
# htpasswd -nb admin password 生成
apiVersion: v1
kind: Secret
metadata:
  name: htpasswd-secret
  namespace: imato-cloud
  labels:
    app: imato
type: Opaque
stringData:
  auth: |
    admin:$apr1$xyz$abcdefghijklmnopqrstuv  # 替换为实际生成的 hash
