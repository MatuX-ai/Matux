name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag to deploy'
        required: true
        type: string

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==================== 质量门禁 ====================
  quality-gate:
    name: 生产部署质量门禁
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Quality checks
        run: |
          npm run lint:ts
          npm run format:check
          npm run test:ci

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build and verify
        run: npm run build:prod

  # ==================== Docker 镜像构建 ====================
  build-docker:
    name: 构建生产 Docker 镜像
    runs-on: ubuntu-latest
    needs: [quality-gate]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_ENV=production
            BUILD_VERSION=${{ github.event.release.tag_name || github.sha }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ==================== 生产部署 ====================
  deploy:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: [build-docker]
    environment:
      name: production
      url: https://imato.ai

    steps:
      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_PROD }}

      - name: Deploy to Kubernetes
        run: |
          RELEASE_TAG=${{ github.event.release.tag_name || inputs.tag }}
          kubectl set image deployment/imato-backend \
            backend=${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${RELEASE_TAG} \
            -n imato-prod
          kubectl rollout status deployment/imato-backend -n imato-prod --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n imato-prod -l app=imato-backend
          kubectl get svc -n imato-prod

  # ==================== 健康检查 ====================
  health-check:
    name: 部署后健康检查
    runs-on: ubuntu-latest
    needs: [deploy]

    steps:
      - name: Check API health
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://imato.ai/health || echo "000")
            if [ "$STATUS" == "200" ]; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "Waiting for service... attempt $i"
            sleep 10
          done
          echo "❌ Health check failed after 12 attempts"
          exit 1

      - name: Notify deployment success
        run: echo "✅ Production deployment completed successfully!"
