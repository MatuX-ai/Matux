name: Code Quality Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  frontend-quality:
    name: Frontend Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Type checking (Angular only)
      run: npx tsc --noEmit --project tsconfig.app.json
      
    - name: ESLint check
      run: npm run lint:ts-check || true
      
    - name: Stylelint check
      run: npm run lint:scss-check || true
      
    - name: Prettier format check
      run: npm run format:check || true
      
    - name: Build test
      run: npx ng build --configuration=production

  backend-quality:
    name: Backend Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.dev.txt
        
    - name: Black format check
      run: black --check backend/ || true
      
    - name: isort import check
      run: isort --check-only backend/ || true
      
    - name: Flake8 linting
      run: flake8 backend/ || true
      
    - name: MyPy type checking
      run: mypy backend/ --ignore-missing-imports || true
      
    - name: Security scan
      run: bandit -r backend/ -ll || true
      
    - name: Test coverage
      run: |
        cd backend
        pytest --cov=. --cov-report=xml --ignore=tests/ || true
        cd ..
        
    - name: Upload coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage.xml
        flags: backend
        name: backend-coverage
        fail_ci_if_error: false

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Run npm audit (informational)
      run: npm audit --audit-level=high || true
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Run safety check (informational)
      run: |
        pip install safety
        safety check -r requirements.txt --full-report || true
        safety check -r requirements.dev.txt --full-report || true

  quality-gate:
    name: Quality Gate
    needs: [frontend-quality, backend-quality, security-audit]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Check job status
      if: >
        needs.frontend-quality.result != 'success' ||
        needs.backend-quality.result != 'success'
      run: |
        echo "❌ Some quality checks failed"
        echo "Frontend: ${{ needs.frontend-quality.result }}"
        echo "Backend: ${{ needs.backend-quality.result }}"
        echo "Security: ${{ needs.security-audit.result }} (informational)"
        exit 1
        
    - name: All checks passed
      run: echo "✅ All quality checks passed!"
