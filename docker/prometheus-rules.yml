# Prometheus 告警规则配置
# 定义各类监控指标的告警阈值

groups:
  # ============================================
  # Backend 应用告警
  # ============================================
  - name: backend_alerts
    interval: 30s
    rules:
      # API 错误率告警
      - alert: HighAPIErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status=~"5..", job="backend"}[5m]))
            /
            sum(rate(http_requests_total{job="backend"}[5m]))
          ) > 0.05
        for: 2m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "API 错误率过高"
          description: "过去 5 分钟 API 错误率超过 5%（当前值：{{ $value | humanizePercentage }}）"

      # API 响应时间过长
      - alert: HighAPILatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job="backend"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "API 响应时间过长"
          description: "P95 响应时间超过 1 秒（当前值：{{ $value | humanizeDuration }}）"

      # Pod 重启频繁
      - alert: PodFrequentRestarts
        expr: |
          increase(kube_pod_container_status_restarts_total{namespace="imato-cloud"}[1h]) > 3
        for: 10m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "Pod 频繁重启"
          description: "Pod {{ $labels.pod }} 在过去 1 小时内重启 {{ $value }} 次"

      # Pod 内存不足
      - alert: PodMemoryPressure
        expr: |
          (
            container_memory_working_set_bytes{namespace="imato-cloud", container="backend"}
            /
            container_spec_memory_limit_bytes{namespace="imato-cloud", container="backend"}
          ) > 0.9
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "Pod 内存使用率过高"
          description: "Pod {{ $labels.pod }} 内存使用率超过 90%（当前值：{{ $value | humanizePercentage }}）"

      # Pod CPU 过载
      - alert: PodCPUOverload
        expr: |
          (
            rate(container_cpu_usage_seconds_total{namespace="imato-cloud", container="backend"}[5m])
            /
            container_spec_cpu_quota{namespace="imato-cloud", container="backend"}
          ) * 100000 > 0.8
        for: 10m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "Pod CPU 使用率过高"
          description: "Pod {{ $labels.pod }} CPU 使用率超过 80%（当前值：{{ $value | humanizePercentage }}）"

  # ============================================
  # 数据库告警
  # ============================================
  - name: database_alerts
    interval: 30s
    rules:
      # PostgreSQL 连接数过多
      - alert: PostgresHighConnections
        expr: |
          (
            pg_stat_activity_count
            /
            pg_settings_max_connections
          ) > 0.8
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "PostgreSQL 连接数过多"
          description: "连接数使用率超过 80%（当前值：{{ $value | humanizePercentage }}）"

      # PostgreSQL 复制延迟
      - alert: PostgresReplicationLag
        expr: |
          pg_replication_lag_seconds > 30
        for: 5m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "PostgreSQL 复制延迟过高"
          description: "复制延迟超过 30 秒（当前值：{{ $value | humanizeDuration }}）"

      # PostgreSQL 磁盘空间不足
      - alert: PostgresDiskSpaceLow
        expr: |
          (
            1 - (pg_database_size_bytes / pg_tablespace_size_bytes)
          ) < 0.1
        for: 10m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "PostgreSQL 磁盘空间不足"
          description: "数据库剩余空间不足 10%（当前可用：{{ $value | humanizePercentage }}）"

  # ============================================
  # Redis 缓存告警
  # ============================================
  - name: redis_alerts
    interval: 30s
    rules:
      # Redis 内存使用率过高
      - alert: RedisHighMemory
        expr: |
          (
            redis_memory_used_bytes
            /
            redis_maxmemory_bytes
          ) > 0.8
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis 内存使用率过高"
          description: "内存使用率超过 80%（当前值：{{ $value | humanizePercentage }}）"

      # Redis 键丢失率过高
      - alert: RedisHighKeyEviction
        expr: |
          rate(redis_evicted_keys_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis 键丢失率过高"
          description: "每秒驱逐 {{ $value }} 个键"

      # Redis 持久化失败
      - alert: RedisPersistenceFailed
        expr: |
          redis_rdb_changes_since_last_save > 1000
        for: 10m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis 持久化失败"
          description: "距离上次成功保存已超过 {{ $value }} 次变更"

  # ============================================
  # 系统资源告警
  # ============================================
  - name: system_alerts
    interval: 30s
    rules:
      # 节点磁盘空间不足
      - alert: NodeDiskSpaceLow
        expr: |
          (
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}
            /
            node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}
          ) < 0.1
        for: 10m
        labels:
          severity: critical
          service: node
        annotations:
          summary: "节点磁盘空间不足"
          description: "节点 {{ $labels.instance }} 磁盘剩余空间不足 10%（当前可用：{{ $value | humanizePercentage }}）"

      # 节点内存不足
      - alert: NodeMemoryPressure
        expr: |
          (
            1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)
          ) > 0.9
        for: 10m
        labels:
          severity: critical
          service: node
        annotations:
          summary: "节点内存不足"
          description: "节点 {{ $labels.instance }} 内存使用率超过 90%"

      # 节点网络流量异常
      - alert: NodeNetworkReceiveErrors
        expr: |
          rate(node_network_receive_errs_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          service: node
        annotations:
          summary: "节点网络接收错误"
          description: "节点 {{ $labels.instance }} 网络接收错误率过高（当前值：{{ $value | humanize }} errors/s）"

  # ============================================
  # 业务指标告警
  # ============================================
  - name: business_alerts
    interval: 1m
    rules:
      # Token 消耗速率异常
      - alert: AbnormalTokenConsumption
        expr: |
          rate(token_consumed_total[1h]) > 10000
        for: 30m
        labels:
          severity: warning
          service: billing
        annotations:
          summary: "Token 消耗速率异常"
          description: "每小时 Token 消耗超过 10000（当前值：{{ $value | humanize }}/h）"

      # AI 服务降级触发
      - alert: AIFallbackTriggered
        expr: |
          ai_fallback_triggered_total > 0
        for: 1m
        labels:
          severity: info
          service: ai
        annotations:
          summary: "AI 服务降级触发"
          description: "AI 服务已触发降级机制（累计次数：{{ $value }}）"
