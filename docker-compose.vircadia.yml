version: '3.8'

services:
  vircadia-server:
    image: vircadia/server:latest
    container_name: matux-vircadia
    restart: unless-stopped
    ports:
      - "9000:9000"    # HTTP API
      - "9001:9001"    # WebSocket
    environment:
      - VIRCADIA_SERVER_NAME=MatuX Virtual World
      - VIRCADIA_MAX_USERS=100
      - VIRCADIA_LOG_LEVEL=info
      - VIRCADIA_DOMAIN=${VIRCADIA_DOMAIN:-localhost}
    volumes:
      - vircadia_data:/var/lib/vircadia
      - vircadia_scenes:/etc/vircadia/scenes
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - matux-network

  vircadia-assets:
    image: nginx:alpine
    container_name: matux-vircadia-assets
    restart: unless-stopped
    ports:
      - "9010:80"
    volumes:
      - ./vircadia-assets:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 5s
      retries: 2
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - matux-network

volumes:
  vircadia_data:
    driver: local
  vircadia_scenes:
    driver: local

networks:
  matux-network:
    external: true
