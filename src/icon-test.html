<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>图标测试</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .icon-test { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
    .icon-test img { width: 32px; height: 32px; margin-right: 10px; vertical-align: middle; }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>图标加载测试</h1>
  <div id="results"></div>

  <script>
    const iconsToTest = [
      'rocket', 'gamepad', 'brain', 'wifi', 'robot', 'lock_open', 'star', 'ar',
      'school', 'award', 'trending_up', 'phone', 'desktop', 'gift', 'link',
      'cube', 'cpu', 'database', 'globe', 'check_circle', 'location_on'
    ];

    async function testIcon(iconName) {
      const div = document.createElement('div');
      div.className = 'icon-test';

      // 测试相对路径
      const img1 = document.createElement('img');
      img1.src = `assets/icons/${iconName}.svg`;
      img1.alt = iconName;

      // 测试绝对路径
      const img2 = document.createElement('img');
      img2.src = `/assets/icons/${iconName}.svg`;
      img2.alt = `${iconName} (absolute)`;

      div.innerHTML = `<strong>${iconName}</strong><br>相对路径: `;
      div.appendChild(img1);
      div.innerHTML += '<br>绝对路径: ';
      div.appendChild(img2);

      // 测试加载
      try {
        const response = await fetch(`assets/icons/${iconName}.svg`);
        const statusSpan = document.createElement('span');
        if (response.ok) {
          statusSpan.className = 'success';
          statusSpan.textContent = ' ✓ 相对路径加载成功';
        } else {
          statusSpan.className = 'error';
          statusSpan.textContent = ` ✗ 相对路径失败 (${response.status})`;
        }
        div.appendChild(statusSpan);
      } catch (e) {
        const errorSpan = document.createElement('span');
        errorSpan.className = 'error';
        errorSpan.textContent = ` ✗ 加载错误: ${e.message}`;
        div.appendChild(errorSpan);
      }

      document.getElementById('results').appendChild(div);
    }

    iconsToTest.forEach(testIcon);
  </script>
</body>
</html>
