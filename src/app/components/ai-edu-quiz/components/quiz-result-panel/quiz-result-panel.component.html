<div class="result-modal" *ngIf="showResult">
  <div class="result-content">
    <div class="result-icon" [ngClass]="scorePercentage >= 80 ? 'success' : scorePercentage >= 60 ? 'warning' : 'danger'">
      {{ scorePercentage >= 80 ? '🎉' : scorePercentage >= 60 ? '👍' : '💪' }}
    </div>
    
    <h2>测验完成！</h2>
    
    <div class="result-stats">
      <div class="stat-item">
        <div class="stat-value">{{ finalScore }}</div>
        <div class="stat-label">得分</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">{{ totalPossibleScore }}</div>
        <div class="stat-label">总分</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">{{ scorePercentage }}%</div>
        <div class="stat-label">正确率</div>
      </div>
    </div>

    <div class="anti-cheating-warning" *ngIf="antiCheatingReport?.isSuspicious">
      <mat-icon>warning</mat-icon>
      <p>检测到 {{ antiCheatingReport.suspiciousActivities }} 次可疑活动</p>
    </div>

    <div class="result-actions">
      <button class="btn btn-primary" (click)="reviewAnswers.emit()">
        查看解析
      </button>
      <button class="btn btn-success" (click)="retryQuiz.emit()">
        重新测验
      </button>
      <button class="btn btn-secondary" (click)="closeResult.emit()">
        关闭
      </button>
    </div>
  </div>
</div>
