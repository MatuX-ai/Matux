<div class="quiz-container">
  <!-- 加载状态 -->
  <div class="loading-overlay" *ngIf="loading">
    <div class="loading-spinner"></div>
    <p>正在加载测验...</p>
  </div>

  <!-- 错误提示 -->
  <div class="error-message" *ngIf="error">
    <div class="error-icon">⚠️</div>
    <p>{{ error }}</p>
    <button class="retry-btn" (click)="startQuiz()">重试</button>
  </div>

  <!-- 测验主体 -->
  <div class="quiz-content" *ngIf="!loading && !error && quizState">
    <!-- 测验头部 -->
    <div class="quiz-header">
      <h2 class="quiz-title">📋 课程测验</h2>
      <app-quiz-timer
        [timeLimitMinutes]="quizState.time_limit_minutes || 0"
        [autoSubmit]="true"
        (timeUpdated)="remainingTime = $event"
        (timeExpired)="submitQuiz()"
      ></app-quiz-timer>
      <div class="quiz-info">
        <div class="info-item">
          <span class="info-icon">📊</span>
          <span class="info-label">进度:</span>
          <span class="info-value">
            {{ quizState!.current_question_index + 1 }} / {{ quizState!.questions.length }}
          </span>
        </div>
        <div class="info-item">
          <span class="info-icon">⭐</span>
          <span class="info-label">当前得分:</span>
          <span class="info-value">{{ currentScore }}</span>
        </div>
      </div>

      <!-- 进度条 -->
      <div class="progress-bar">
        <div
          class="progress-fill"
          [style.width.%]="
            ((quizState!.current_question_index + 1) / quizState!.questions.length) * 100
          "
        ></div>
      </div>
    </div>

    <!-- 题目区域 -->
    <app-quiz-question-display
      [question]="currentQuestion"
      [userAnswer]="userAnswers[currentQuestion.id]"
      [submitted]="submitted"
      [showCorrectAnswer]="showCorrectAnswer"
      [showWrongAnswer]="showWrongAnswer"
      (answerChanged)="userAnswers[currentQuestion.id] = $event"
      (codeRun)="runCode()"
    ></app-quiz-question-display>

    <!-- 题目导航 -->
    <div class="question-navigation">
      <button class="btn btn-secondary" (click)="previousQuestion()" [disabled]="quizState!.current_question_index === 0 || submitted">
        ⬅️ 上一题
      </button>
      
      <div class="answer-indicators">
        <span
          class="indicator"
          *ngFor="let question of quizState!.questions; let i = index"
          [class.current]="i === quizState!.current_question_index"
          [class.answered]="isQuestionAnswered(i)"
          [class.unanswered]="!isQuestionAnswered(i)"
          (click)="goToQuestion(i)"
        >
          {{ i + 1 }}
        </span>
      </div>
      
      <button 
        class="btn btn-primary" 
        (click)="nextQuestion()" 
        [disabled]="quizState!.current_question_index >= quizState!.questions.length - 1 || submitted">
        下一题 ➡️
      </button>
    </div>

    <!-- 操作按钮 -->
    <div class="quiz-actions">
      <button class="btn btn-success btn-lg" (click)="submitQuiz()" [disabled]="submitted">
        提交测验
      </button>
    </div>

    <!-- 结果面板 -->
    <app-quiz-result-panel
      [showResult]="showResult"
      [finalScore]="finalScore"
      [totalPossibleScore]="totalPossibleScore"
      [earnedPoints]="earnedPoints"
      [accuracyRate]="accuracyRate"
      [timeSpent]="timeSpent"
      [antiCheatingReport]="null"
      (reviewAnswers)="reviewAnswers()"
      (retryQuiz)="retryQuiz()"
      (closeResult)="closeResult()"
    ></app-quiz-result-panel>

    <!-- 解析面板 -->
    <app-quiz-explanation-panel
      [showExplanationPanel]="showExplanationPanel"
      [questionExplanations]="questionExplanations"
      [quizResult]="quizResult"
      (close)="showExplanationPanel = false"
    ></app-quiz-explanation-panel>
  </div>
</div>
