<div class="ai-code-generator">
  <div class="container">
    <!-- 标题 -->
    <div class="header">
      <h1>🤖 AI代码生成器</h1>
      <p>使用先进的AI模型快速生成高质量代码</p>
    </div>

    <!-- 主要内容区域 -->
    <div class="main-content">
      <!-- 左侧配置面板 -->
      <div class="config-panel">
        <app-code-generation-form
          [generationForm]="generationForm"
          [isGenerating]="isGenerating"
          [templates]="templates"
          [selectedTemplate]="selectedTemplate"
          [templateArgs]="templateArgs"
          [providers]="providers"
          [languages]="languages"
          (formSubmit)="generateCode()"
          (clearResult)="clearResult()"
          (templateSelected)="applyTemplate($event)"
          (useCustomTemplate)="useTemplate()">
        </app-code-generation-form>
      </div>

      <!-- 右侧结果显示 -->
      <div class="result-panel">
        <!-- 状态消息 -->
        <div *ngIf="successMessage" class="alert alert-success">
          {{ successMessage }}
        </div>
        
        <div *ngIf="errorMessage" class="alert alert-error">
          {{ errorMessage }}
        </div>

        <!-- 代码输出 -->
        <app-code-output-display
          [generatedCode]="generatedCode"
          [isGenerating]="isGenerating"
          [language]="generationForm.get('language')?.value"
          (copyCode)="copyCode()"
          (downloadCode)="downloadCode()">
        </app-code-output-display>

        <!-- 历史记录 -->
        <app-generation-history
          [generationHistory]="generationHistory"
          (historyItemSelected)="selectFromHistory($event)"
          (historyCleared)="clearHistory()">
        </app-generation-history>
      </div>
    </div>
  </div>
</div>
