<div class="history-panel">
  <div class="panel-header">
    <h3>📚 历史记录</h3>
    <button 
      class="btn-clear-history"
      (click)="historyCleared.emit()"
      *ngIf="generationHistory.length > 0">
      清除历史
    </button>
  </div>
  
  <div class="history-list" *ngIf="generationHistory.length > 0">
    <div 
      *ngFor="let item of generationHistory; let i = index" 
      class="history-item"
      (click)="historyItemSelected.emit(item)">
      <div class="history-item-header">
        <span class="provider-tag">{{ getProviderDisplayName(item.provider) }}</span>
        <span class="timestamp">{{ item.processingTime.toFixed(2) }}s</span>
      </div>
      <div class="history-item-prompt">
        {{ item.code.substring(0, 100) }}{{ item.code.length > 100 ? '...' : '' }}
      </div>
    </div>
  </div>
  
  <div *ngIf="generationHistory.length === 0" class="empty-history">
    <p>暂无历史记录</p>
  </div>
</div>
