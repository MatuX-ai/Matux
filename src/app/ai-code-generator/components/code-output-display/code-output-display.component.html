<div class="code-output-container" #codeOutput>
  <div class="panel-header">
    <h3>📋 生成结果</h3>
    <div class="code-actions" *ngIf="generatedCode">
      <button class="btn-icon" (click)="copyCode.emit()" title="复制代码">
        <i>📋</i>
      </button>
      <button class="btn-icon" (click)="downloadCode.emit()" title="下载代码">
        <i>💾</i>
      </button>
    </div>
  </div>
  
  <div *ngIf="generatedCode" class="code-display">
    <pre><code class="language-{{ language }}">{{ generatedCode }}</code></pre>
  </div>
  
  <div *ngIf="!generatedCode && !isGenerating" class="placeholder">
    <div class="placeholder-content">
      <div class="placeholder-icon">💻</div>
      <h4>等待生成代码</h4>
      <p>配置好参数后点击"生成代码"按钮开始</p>
    </div>
  </div>
  
  <div *ngIf="isGenerating" class="generating-placeholder">
    <div class="spinner-large"></div>
    <p>AI正在为您生成代码，请稍候...</p>
  </div>
</div>
