<form [formGroup]="generationForm" (ngSubmit)="formSubmit.emit()" class="generation-form">
  
  <!-- 预设模板选择 -->
  <div class="form-section">
    <h3>🎯 预设模板</h3>
    <div class="template-selector">
      <select (change)="onTemplateChange($event)" class="template-select">
        <option value="">选择预设模板...</option>
        <option *ngFor="let template of templates" [value]="template.value">
          {{ template.name }}
        </option>
      </select>
      
      <button type="button" (click)="useCustomTemplate.emit()" class="btn btn-secondary">
        自定义提示
      </button>
    </div>
    
    <div *ngIf="selectedTemplate" class="template-preview">
      <p><strong>当前模板:</strong> {{ getSelectedTemplateName() }}</p>
      <small>参数: {{ templateArgs }}</small>
    </div>
  </div>

  <!-- 自定义提示输入 -->
  <div class="form-section" *ngIf="!selectedTemplate">
    <h3>📝 生成提示</h3>
    <div class="form-group">
      <label for="prompt">代码需求描述 *</label>
      <textarea 
        id="prompt"
        formControlName="prompt"
        placeholder="请详细描述你想要生成的代码，例如：创建一个Python函数来计算斐波那契数列..."
        rows="4"
        class="form-control"
        [class.error]="generationForm.get('prompt')?.invalid && generationForm.get('prompt')?.touched">
      </textarea>
      <div *ngIf="generationForm.get('prompt')?.invalid && generationForm.get('prompt')?.touched" 
           class="error-message">
        <span *ngIf="generationForm.get('prompt')?.errors?.['required']">请输入代码需求描述</span>
        <span *ngIf="generationForm.get('prompt')?.errors?.['minlength']">描述至少需要5个字符</span>
      </div>
    </div>
  </div>

  <!-- AI模型配置 -->
  <div class="form-section">
    <h3>⚙️ AI模型配置</h3>
    
    <div class="form-row">
      <div class="form-group half-width">
        <label for="provider">AI提供商</label>
        <select 
          id="provider"
          formControlName="provider"
          class="form-control">
          <option *ngFor="let provider of providers" [value]="provider">
            {{ getProviderDisplayName(provider) }}
          </option>
        </select>
      </div>
      
      <div class="form-group half-width">
        <label for="language">目标语言</label>
        <select 
          id="language"
          formControlName="language"
          class="form-control">
          <option *ngFor="let language of languages" [value]="language">
            {{ getLanguageDisplayName(language) }}
          </option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group half-width">
        <label for="temperature">创造性 (0-1)</label>
        <input 
          type="range" 
          id="temperature"
          formControlName="temperature"
          min="0" 
          max="1" 
          step="0.1"
          class="slider">
        <span class="slider-value">{{ generationForm.get('temperature')?.value }}</span>
      </div>
      
      <div class="form-group half-width">
        <label for="maxTokens">最大令牌数</label>
        <input 
          type="number" 
          id="maxTokens"
          formControlName="maxTokens"
          min="100" 
          max="8000"
          class="form-control">
      </div>
    </div>

    <div class="form-group">
      <label for="systemPrompt">系统提示 (可选)</label>
      <textarea 
        id="systemPrompt"
        formControlName="systemPrompt"
        placeholder="为AI提供额外的上下文信息..."
        rows="2"
        class="form-control">
      </textarea>
    </div>
  </div>

  <!-- 操作按钮 -->
  <div class="form-actions">
    <button 
      type="submit" 
      class="btn btn-primary generate-btn"
      [disabled]="generationForm.invalid || isGenerating">
      <span *ngIf="!isGenerating">✨ 生成代码</span>
      <span *ngIf="isGenerating">
        <span class="spinner"></span> 生成中...
      </span>
    </button>
    
    <button 
      type="button" 
      class="btn btn-secondary"
      (click)="clearResult.emit()"
      [disabled]="isGenerating">
      清除结果
    </button>
  </div>
</form>
