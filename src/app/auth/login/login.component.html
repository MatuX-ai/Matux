<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header class="login-header">
      <div class="logo-icon">
        <mat-icon class="logo-mat-icon">school</mat-icon>
      </div>
      <mat-card-title class="login-title">登录 MatuX</mat-card-title>
      <mat-card-subtitle class="login-subtitle"> 欢迎回来，继续你的 AI 学习之旅 </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form class="login-form" (ngSubmit)="onLogin()" #loginForm="ngForm">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>邮箱地址</mat-label>
          <input
            matInput
            type="email"
            name="email"
            [(ngModel)]="credentials.email"
            #emailModel="ngModel"
            required
            email
            placeholder="请输入邮箱地址"
          />
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="emailModel.invalid && emailModel.touched">
            <span *ngIf="emailModel.errors?.['required']">邮箱地址不能为空</span>
            <span *ngIf="emailModel.errors?.['email']">请输入有效的邮箱地址</span>
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>密码</mat-label>
          <input
            matInput
            [type]="hidePassword ? 'password' : 'text'"
            name="password"
            [(ngModel)]="credentials.password"
            #passwordModel="ngModel"
            required
            minlength="6"
            placeholder="请输入密码"
          />
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="passwordModel.invalid && passwordModel.touched">
            <span *ngIf="passwordModel.errors?.['required']">密码不能为空</span>
            <span *ngIf="passwordModel.errors?.['minlength']">密码至少6个字符</span>
          </mat-error>
        </mat-form-field>

        <div class="form-options">
          <mat-checkbox [(ngModel)]="rememberMe" name="rememberMe" color="primary">
            记住我
          </mat-checkbox>
        </div>

        <div class="error-alert" *ngIf="errorMessage">
          <mat-icon color="warn">error</mat-icon>
          <span>{{ errorMessage }}</span>
        </div>

        <button
          mat-flat-button
          color="primary"
          type="submit"
          class="full-width login-button"
          [disabled]="loginForm.invalid || loading"
        >
          <mat-spinner *ngIf="loading" diameter="20" class="btn-spinner"></mat-spinner>
          <span *ngIf="!loading">登录</span>
        </button>

        <button
          mat-stroked-button
          type="button"
          class="full-width test-login-button"
          (click)="loginAsTestUser()"
          [disabled]="loading"
          matTooltip="开发环境快捷登录：自动填入测试账号"
        >
          <mat-icon>bug_report</mat-icon>
          <span>测试账号一键登录</span>
        </button>
      </form>

      <div class="oauth-divider">
        <div class="divider-line"></div>
        <span class="divider-text">或使用第三方登录</span>
        <div class="divider-line"></div>
      </div>

      <div class="oauth-buttons">
        <button mat-icon-button class="oauth-icon-btn oauth-qq" matTooltip="QQ 登录" (click)="loginWithQQ()">
          <svg class="oauth-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M21.395 15.035a40 40 0 0 0-.803-2.264l-1.079-2.695c.001-.032.014-.562.014-.836C19.526 4.632 17.351 0 12 0S4.474 4.632 4.474 9.241c0 .274.013.804.014.836l-1.08 2.695a39 39 0 0 0-.802 2.264c-1.021 3.283-.69 4.643-.438 4.673.54.065 2.103-2.472 2.103-2.472 0 1.469.756 3.387 2.394 4.771-.612.188-1.363.479-1.845.835-.434.32-.379.646-.301.778.343.578 5.883.369 7.482.189 1.6.18 7.14.389 7.483-.189.078-.132.132-.458-.301-.778-.483-.356-1.233-.646-1.846-.836 1.637-1.384 2.393-3.302 2.393-4.771 0 0 1.563 2.537 2.103 2.472.251-.03.581-1.39-.438-4.673"/>
          </svg>
        </button>
        <button mat-icon-button class="oauth-icon-btn oauth-wechat" matTooltip="微信登录" (click)="loginWithWechat()">
          <svg class="oauth-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178A1.17 1.17 0 0 1 4.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178 1.17 1.17 0 0 1-1.162-1.178c0-.651.52-1.18 1.162-1.18zm5.34 2.867c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.942 2.453 3.666 4.229 6.884 4.229.826 0 1.622-.12 2.361-.336a.722.722 0 0 1 .598.082l1.584.926a.272.272 0 0 0 .14.047c.134 0 .24-.111.24-.247 0-.06-.023-.12-.038-.177l-.327-1.233a.582.582 0 0 1-.023-.156.49.49 0 0 1 .201-.398C23.024 18.48 24 16.82 24 14.98c0-3.21-2.931-5.837-6.656-6.088V8.89c-.135-.01-.27-.027-.407-.03zm-2.53 3.274c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.97-.982zm4.844 0c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.969-.982z"/>
          </svg>
        </button>
        <button mat-icon-button class="oauth-icon-btn oauth-google" matTooltip="Google 登录" (click)="loginWithGoogle()">
          <svg class="oauth-icon" viewBox="0 0 24 24">
            <path
              class="google-g"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            />
            <path
              class="google-e"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            />
            <path
              class="google-y"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            />
            <path
              class="google-r"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            />
          </svg>
        </button>
        <button mat-icon-button class="oauth-icon-btn oauth-github" matTooltip="GitHub 登录" (click)="loginWithGithub()">
          <svg class="oauth-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
          </svg>
        </button>
      </div>
    </mat-card-content>

    <mat-card-footer class="login-footer">
      <span>还没有账号？</span>
      <a mat-button color="primary" [routerLink]="ROUTES.AUTH.REGISTER">立即注册</a>
    </mat-card-footer>
  </mat-card>
</div>
