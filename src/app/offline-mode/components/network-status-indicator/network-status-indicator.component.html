<div class="network-status-indicator" 
     [class.low-quality]="isLowQualityNetwork()"
     matTooltip="{{getDetailedStatus()}}"
     matTooltipPosition="below">
  <div class="status-content">
    <mat-icon 
      class="status-icon"
      [ngClass]="getStatusColor()">
      {{getStatusIcon()}}
    </mat-icon>
    <span class="status-text">{{getStatusText()}}</span>
    <button 
      mat-icon-button 
      class="refresh-button"
      (click)="refreshStatus()"
      matTooltip="刷新网络状态">
      <mat-icon>refresh</mat-icon>
    </button>
  </div>
  
  <!-- 网络质量指示条 -->
  <div class="quality-bar" *ngIf="networkStatus?.isOnline">
    <div class="quality-segment" 
         [class.active]="networkStatus?.quality === 'slow-2g'"
         title="2G网络">
    </div>
    <div class="quality-segment" 
         [class.active]="networkStatus?.quality === 'slow-3g' || networkStatus?.quality === 'slow-2g'"
         title="3G网络">
    </div>
    <div class="quality-segment" 
         [class.active]="networkStatus?.quality === 'fast-4g' || networkStatus?.quality === 'slow-3g' || networkStatus?.quality === 'slow-2g'"
         title="4G网络">
    </div>
    <div class="quality-segment" 
         [class.active]="networkStatus?.quality === 'fast-wifi'"
         title="WiFi网络">
    </div>
  </div>
</div>
