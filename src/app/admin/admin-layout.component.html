<div class="admin-layout">
  <!-- 移动端导航（仅移动端显示） -->
  <app-admin-mobile-nav></app-admin-mobile-nav>

  <!-- 顶部 Header - 横跨整个页面 -->
  <header class="admin-header">
    <div class="header-left">
      <button mat-icon-button (click)="goBack()" matTooltip="返回">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <span class="page-title">
        {{ getCurrentPageTitle() }}
      </span>
    </div>

    <div class="admin-user-info">
      <button mat-button [matMenuTriggerFor]="userMenu">
        <mat-icon>account_circle</mat-icon>
        <span>{{ currentUser?.username || '管理员' }}</span>
      </button>
      <mat-menu #userMenu="matMenu">
        <button mat-menu-item (click)="logout()">
          <mat-icon>exit_to_app</mat-icon>
          <span>退出登录</span>
        </button>
      </mat-menu>
    </div>
  </header>

  <!-- 内容容器（侧边栏 + 主内容区） -->
  <div class="admin-body">
    <!-- 统一侧边栏（桌面端显示） -->
    <app-admin-sidebar
      [defaultCollapsed]="false"
      (collapsedChange)="onSidebarCollapsedChange($event)"
    >
    </app-admin-sidebar>

    <!-- 主内容区 -->
    <div class="admin-content" [class.sidebar-collapsed]="sidebarCollapsed">
      <!-- 页面内容 -->
      <main class="admin-main-content">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
</div>
