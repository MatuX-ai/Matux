<div class="achievement-review">
  <h2>审核成果</h2>

  <div *ngIf="achievement" class="achievement-summary">
    <h3>{{ achievement.title }}</h3>
    <p>{{ achievement.description }}</p>
  </div>

  <!-- 审核表单 -->
  <form [formGroup]="reviewForm" (ngSubmit)="onSubmit()">
    <mat-form-field appearance="fill">
      <mat-label>审核结果</mat-label>
      <mat-select formControlName="status">
        <mat-option value="approved">通过</mat-option>
        <mat-option value="rejected">拒绝</mat-option>
        <mat-option value="revision">需要修改</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>评分 (1-5)</mat-label>
      <mat-slider
        formControlName="score"
        [min]="1"
        [max]="5"
        [step]="1"
        thumbLabel
      ></mat-slider>
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>反馈意见</mat-label>
      <textarea
        matInput
        formControlName="feedback"
        rows="4"
        placeholder="请输入审核反馈..."
      ></textarea>
    </mat-form-field>

    <div class="actions">
      <button
        mat-raised-button
        color="primary"
        type="submit"
        [disabled]="reviewing"
      >
        {{ reviewing ? '提交中...' : '提交审核' }}
      </button>
    </div>
  </form>

  <!-- 审核历史 -->
  <div *ngIf="reviewHistory.length > 0" class="review-history">
    <h3>审核历史</h3>
    <div *ngFor="let review of reviewHistory" class="review-item">
      <div class="review-status">{{ review.status }}</div>
      <div class="review-score">评分: {{ review.score }}</div>
      <div class="review-feedback">{{ review.feedback }}</div>
    </div>
  </div>
</div>
