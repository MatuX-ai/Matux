<div class="plugin-store-container">
  <!-- Phase 5: 首次启动引导 -->
  <app-first-run-guide 
    *ngIf="showFirstRunGuide"
    (ngOnDestroy)="onFirstRunComplete()">
  </app-first-run-guide>

  <!-- 主内容（非首次运行时显示） -->
  <div *ngIf="!showFirstRunGuide">
  <!-- 头部 -->
  <header class="store-header">
    <div class="header-top">
      <h1 class="store-title">
        <mat-icon>extension</mat-icon>
        插件商店
      </h1>
      
      <div class="header-actions">
        <button mat-icon-button (click)="refresh()" matTooltip="刷新列表">
          <mat-icon>refresh</mat-icon>
        </button>
        
        <button
          mat-icon-button
          [routerLink]="['/plugins/installed']"
          matTooltip="已安装插件"
        >
          <mat-icon>check_circle</mat-icon>
        </button>
      </div>
    </div>
    
    <!-- Phase 5: 更新通知 -->
    <app-plugin-updates></app-plugin-updates>
    
    <!-- 统计信息 -->
    <div class="stats-bar" *ngIf="stats">
      <div class="stat-item">
        <span class="stat-value">{{ getPluginCount() }}</span>
        <span class="stat-label">可用插件</span>
      </div>
      <div class="stat-item">
        <span class="stat-value">{{ getInstalledCount() }}</span>
        <span class="stat-label">已安装</span>
      </div>
      <div class="stat-item">
        <span class="stat-value">{{ getEnabledCount() }}</span>
        <span class="stat-label">已启用</span>
      </div>
    </div>
    
    <!-- 搜索栏 -->
    <div class="search-bar">
      <mat-form-field appearance="outline" class="search-input">
        <mat-label>搜索插件</mat-label>
        <mat-icon matPrefix>search</mat-icon>
        <input
          matInput
          [(ngModel)]="searchQuery"
          (ngModelChange)="onSearchInput($event)"
          placeholder="输入名称、描述或关键词..."
        />
        <button
          *ngIf="searchQuery"
          matSuffix
          mat-icon-button
          (click)="clearSearch()"
        >
          <mat-icon>close</mat-icon>
        </button>
      </mat-form-field>
      
      <!-- 兼容性过滤 -->
      <button
        mat-stroked-button
        [class.active]="compatibleOnly"
        (click)="toggleCompatibleOnly()"
        class="filter-button"
      >
        <mat-icon>{{ compatibleOnly ? 'check_box' : 'check_box_outline_blank' }}</mat-icon>
        仅显示兼容
      </button>
    </div>
  </header>
  
  <!-- 分类导航 -->
  <nav class="category-nav">
    <div class="category-list">
      <button
        mat-chip
        [selected]="!selectedCategory"
        (click)="selectCategory(null)"
        class="category-chip"
      >
        <mat-icon>apps</mat-icon>
        全部
      </button>
      
      <button
        *ngFor="let cat of categories"
        mat-chip
        [selected]="selectedCategory === cat.id"
        (click)="selectCategory(cat.id)"
        class="category-chip"
      >
        <mat-icon>{{ cat.icon }}</mat-icon>
        {{ cat.name }}
      </button>
    </div>
  </nav>
  
  <!-- Phase 5: 推荐插件 -->
  <app-plugin-recommendations></app-plugin-recommendations>
  
  <!-- 标签页 -->
  <mat-tab-group
    (selectedTabChange)="onTabChange($event)"
    class="store-tabs"
  >
    <mat-tab label="全部插件">
      <ng-template mat-tab-label>
        <mat-icon>apps</mat-icon>
        全部插件
      </ng-template>
    </mat-tab>
    
    <mat-tab label="已安装">
      <ng-template mat-tab-label>
        <mat-icon>check_circle</mat-icon>
        已安装
        <span class="tab-badge" *ngIf="getInstalledCount() > 0">
          {{ getInstalledCount() }}
        </span>
      </ng-template>
    </mat-tab>
    
    <mat-tab label="兼容设备">
      <ng-template mat-tab-label>
        <mat-icon>devices</mat-icon>
        兼容设备
      </ng-template>
    </mat-tab>
  </mat-tab-group>
  
  <!-- 内容区域 -->
  <main class="store-content">
    <!-- 加载状态 -->
    <div *ngIf="loading" class="loading-container">
      <mat-spinner diameter="48"></mat-spinner>
      <p class="loading-text">正在加载插件列表...</p>
    </div>
    
    <!-- 错误状态 -->
    <div *ngIf="error" class="error-container">
      <mat-icon class="error-icon">error_outline</mat-icon>
      <p class="error-text">{{ error }}</p>
      <button mat-raised-button color="primary" (click)="loadPlugins()">
        <mat-icon>refresh</mat-icon>
        重试
      </button>
    </div>
    
    <!-- 空状态 -->
    <div *ngIf="!loading && !error && filteredPlugins.length === 0" class="empty-container">
      <mat-icon class="empty-icon">search_off</mat-icon>
      <p class="empty-text">没有找到匹配的插件</p>
      <p class="empty-hint">尝试调整搜索条件或过滤选项</p>
      <button mat-stroked-button (click)="clearSearch()" *ngIf="searchQuery">
        清除搜索
      </button>
    </div>
    
    <!-- 插件网格 -->
    <div *ngIf="!loading && !error && filteredPlugins.length > 0" class="plugin-grid">
      <app-plugin-card
        *ngFor="let plugin of filteredPlugins"
        [plugin]="plugin"
        (click)="selectPlugin(plugin.id)"
        class="plugin-card-item"
      ></app-plugin-card>
    </div>
  </main>
  
  <!-- Phase 5: 插件详情（评论和使用统计） -->
  <div *ngIf="showPluginDetails && selectedPluginId" class="plugin-details-panel">
    <div class="details-header">
      <h3>插件详情</h3>
      <button mat-icon-button (click)="closePluginDetails()" matTooltip="关闭">
        <mat-icon>close</mat-icon>
      </button>
    </div>
    
    <app-plugin-usage-stats [pluginId]="selectedPluginId"></app-plugin-usage-stats>
    <app-plugin-reviews [pluginId]="selectedPluginId"></app-plugin-reviews>
  </div>
  </div> <!-- 结束 !showFirstRunGuide -->
</div>
