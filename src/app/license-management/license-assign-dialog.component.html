<h2 mat-dialog-title>分配许可证</h2>

<form [formGroup]="assignForm" (ngSubmit)="onSubmit()">
  <mat-dialog-content>
    <!-- 用户选择 -->
    <div class="user-selection-section">
      <div class="section-header">
        <h3>选择用户</h3>
        <button type="button" mat-button (click)="onSelectAll()">
          {{ selectedUserIds.length === availableUsers.length ? '取消全选' : '全选' }}
        </button>
      </div>

      <div class="user-list">
        <div *ngFor="let user of availableUsers"
             class="user-item"
             [class.selected]="selectedUserIds.includes(user.id)"
             (click)="onToggleUser(user.id)">
          <mat-checkbox [checked]="selectedUserIds.includes(user.id)"></mat-checkbox>
          <div class="user-info">
            <div class="user-name">{{ user.name }}</div>
            <div class="user-email">{{ user.email }}</div>
          </div>
          <mat-chip variant="outlined" *ngIf="user.currentLicenses > 0">
            已有 {{ user.currentLicenses }} 个许可证
          </mat-chip>
        </div>
      </div>

      <div class="selection-summary">
        已选择 <strong>{{ selectedUserIds.length }}</strong> 个用户
      </div>
    </div>

    <!-- 角色选择 -->
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>用户角色</mat-label>
      <mat-select [(value)]="role">
        <mat-option value="admin">管理员</mat-option>
        <mat-option value="user">普通用户</mat-option>
      </mat-select>
      <mat-hint>管理员可以管理许可证分配，普通用户仅可使用</mat-hint>
    </mat-form-field>

    <!-- 备注 -->
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>备注（可选）</mat-label>
      <textarea matInput [(ngModel)]="notes" rows="3" placeholder="添加备注信息..."></textarea>
    </mat-form-field>

    <!-- 提示信息 -->
    <div class="info-box">
      <mat-icon>info</mat-icon>
      <div>
        <strong>提示：</strong>
        <p>分配后，用户将立即获得许可证权限。您可以随时回收已分配的许可证。</p>
      </div>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button type="button" mat-button (click)="onCancel()" [disabled]="isSubmitting">
      取消
    </button>
    <button type="submit"
            mat-raised-button
            color="primary"
            [disabled]="selectedUserIds.length === 0 || isSubmitting">
      <mat-icon *ngIf="isSubmitting">progress_activity</mat-icon>
      {{ isSubmitting ? '分配中...' : '确认分配' }}
    </button>
  </mat-dialog-actions>
</form>
