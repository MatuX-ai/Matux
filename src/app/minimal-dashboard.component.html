<div class="welcome-container">
  <div class="welcome-content">
    <!-- Logo & 品牌 -->
    <div class="brand-section">
      <div class="logo-icon">
        <mat-icon>school</mat-icon>
      </div>
      <h1 class="brand-name">MatuX</h1>
      <p class="tagline">AI 驱动的 STEM 教育新纪元</p>
    </div>

    <!-- 功能特色卡片 -->
    <div class="features-grid">
      <div class="feature-card">
        <mat-icon class="feature-icon code-icon">code</mat-icon>
        <h3>AI 编程教育</h3>
        <p>Monaco Editor + AI 代码补全，从积木编程到代码实战</p>
      </div>

      <div class="feature-card">
        <mat-icon class="feature-icon lab-icon">science</mat-icon>
        <h3>STEM 实验室</h3>
        <p>电路仿真、AR/VR 探索、数字孪生，动手做科学</p>
      </div>

      <div class="feature-card">
        <mat-icon class="feature-icon ai-icon">smart_toy</mat-icon>
        <h3>AI 个性化教师</h3>
        <p>智能画像、成长追踪、个性化教学建议</p>
      </div>

      <div class="feature-card">
        <mat-icon class="feature-icon offline-icon">cloud_off</mat-icon>
        <h3>离线学习</h3>
        <p>断网也能编程做实验，恢复网络自动同步</p>
      </div>
    </div>

    <!-- 行动号召 -->
    <div class="cta-section">
      <button mat-flat-button class="cta-button" (click)="startLearning()">
        开始学习之旅
        <mat-icon>arrow_forward</mat-icon>
      </button>
      <p class="cta-hint">无需登录即可浏览，需要保存数据时再登录</p>
    </div>

    <!-- 页脚 -->
    <footer class="welcome-footer">
      <p>© 2026 MatuX 教育科技平台 | 版本 1.0.0</p>
    </footer>
  </div>
</div>
