<div class="plugin-card" [class.installed]="isInstalled()">
  <!-- 头部 -->
  <div class="card-header">
    <div class="plugin-icon">
      <img
        *ngIf="plugin.icon"
        [src]="plugin.icon"
        [alt]="plugin.name"
        class="icon-image"
      />
      <mat-icon *ngIf="!plugin.icon" class="icon-placeholder">extension</mat-icon>
    </div>
    
    <div class="plugin-info">
      <h3 class="plugin-name">{{ plugin.name }}</h3>
      <p class="plugin-author">by {{ plugin.author }}</p>
    </div>
    
    <!-- 兼容性标识 -->
    <div
      class="compatibility-badge"
      [matTooltip]="isCompatible() ? '兼容当前设备' : '不兼容当前设备'"
      *ngIf="plugin.compatible !== undefined"
    >
      <mat-icon [style.color]="getCompatibilityColor()">
        {{ getCompatibilityIcon() }}
      </mat-icon>
    </div>
  </div>
  
  <!-- 描述 -->
  <p class="plugin-description">{{ plugin.description }}</p>
  
  <!-- 分类标签 -->
  <div class="plugin-categories">
    <mat-chip-set>
      <mat-chip *ngFor="let cat of getCategoryLabels()" class="category-chip">
        {{ cat }}
      </mat-chip>
    </mat-chip-set>
  </div>
  
  <!-- 安装进度 -->
  <div *ngIf="installProgress" class="install-progress">
    <mat-progress-bar
      mode="determinate"
      [value]="installProgress.progress"
      [color]="installProgress.status === 'failed' ? 'warn' : 'primary'"
    ></mat-progress-bar>
    <p class="progress-text">{{ installProgress.message }}</p>
  </div>
  
  <!-- 底部 -->
  <div class="card-footer">
    <div class="plugin-meta">
      <span class="version">v{{ plugin.version }}</span>
      <span
        class="state-badge"
        [style.background]="getStateColor()"
        *ngIf="isInstalled()"
      >
        {{ getStateLabel() }}
      </span>
    </div>
    
    <div class="card-actions">
      <!-- 查看详情 -->
      <button
        mat-icon-button
        [routerLink]="['/plugins/detail', plugin.id]"
        matTooltip="查看详情"
      >
        <mat-icon>info</mat-icon>
      </button>
      
      <!-- 安装按钮 -->
      <button
        *ngIf="!isInstalled() && isCompatible()"
        mat-raised-button
        color="primary"
        [disabled]="installing"
        (click)="installPlugin()"
        class="install-button"
      >
        <mat-icon *ngIf="!installing">download</mat-icon>
        <mat-icon *ngIf="installing" class="spinning">progress_activity</mat-icon>
        {{ installing ? '安装中...' : '安装' }}
      </button>
      
      <!-- 不兼容提示 -->
      <button
        *ngIf="!isInstalled() && !isCompatible()"
        mat-raised-button
        disabled
        class="incompatible-button"
      >
        <mat-icon>block</mat-icon>
        不兼容
      </button>
      
      <!-- 已安装 -->
      <button
        *ngIf="isInstalled()"
        mat-stroked-button
        [routerLink]="['/plugins/detail', plugin.id]"
        class="manage-button"
      >
        <mat-icon>settings</mat-icon>
        管理
      </button>
    </div>
  </div>
</div>
