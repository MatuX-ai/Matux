<!-- 底部状态栏 -->
<footer class="status-bar" role="contentinfo">
  <div class="status-bar-content">
    <!-- 左侧：用户信息 + 在线状态 -->
    <div class="status-group">
      <div class="status-item user-info" *ngIf="currentUser" matTooltip="当前用户">
        <mat-icon>person</mat-icon>
        <span class="status-text">{{ currentUser }}</span>
      </div>
      <div class="status-item" [matTooltip]="isOnline ? '已连接网络' : '网络未连接'">
        <mat-icon [class]="getOnlineStatusClass()">{{ getOnlineStatusIcon() }}</mat-icon>
        <span class="status-text">{{ getOnlineStatusText() }}</span>
      </div>
    </div>

    <!-- 中间：后端状态 -->
    <div class="status-item" [matTooltip]="isBackendRunning ? 'Python 后端运行正常' : '后端未启动'">
      <mat-icon [class]="getBackendStatusClass()">
        {{ isBackendRunning ? 'check_circle' : 'error' }}
      </mat-icon>
      <span class="status-text">{{ getBackendStatusText() }}</span>
    </div>

    <!-- 右侧：应用版本 -->
    <div class="status-item status-version" matTooltip="MatuX 桌面端版本">
      <span class="version-text">{{ appVersion }}</span>
    </div>
  </div>
</footer>
