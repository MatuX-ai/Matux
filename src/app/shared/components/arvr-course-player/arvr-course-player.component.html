<div class="arvr-course-player">
  <!-- 加载状态 -->
  <div *ngIf="isLoading" class="loading-overlay">
    <mat-spinner diameter="48"></mat-spinner>
    <p>正在加载课程...</p>
  </div>

  <!-- 错误状态 -->
  <div *ngIf="errorMessage" class="error-overlay">
    <mat-icon class="error-icon">error_outline</mat-icon>
    <h3>加载失败</h3>
    <p>{{ errorMessage }}</p>
    <button mat-raised-button color="primary" (click)="retryLoad()">
      <mat-icon>refresh</mat-icon>
      重试
    </button>
  </div>

  <!-- 课程内容 -->
  <div *ngIf="!isLoading && !errorMessage" class="course-content">
    <!-- 3D 场景容器 -->
    <div class="scene-container">
      <div #threeContainer class="three-container"></div>

      <div class="scene-controls">
        <button mat-mini-fab (click)="toggleAutoRotate()"
                matTooltip="自动旋转">
          <mat-icon>rotate_right</mat-icon>
        </button>
        <button mat-mini-fab (click)="resetView()" matTooltip="重置视角">
          <mat-icon>center_focus_strong</mat-icon>
        </button>
      </div>
    </div>

    <!-- 课程信息面板 -->
    <div class="info-panel">
      <mat-card class="course-info-card">
        <mat-card-header>
          <mat-card-title>{{ courseData?.title }}</mat-card-title>
          <mat-card-subtitle>{{ courseData?.description }}</mat-card-subtitle>
        </mat-card-header>
      </mat-card>

      <!-- 课程材料 -->
      <mat-card *ngIf="courseData?.course_materials?.length" class="materials-card">
        <mat-card-content>
          <div class="material-navigation">
            <button mat-icon-button (click)="prevMaterial()"
                    [disabled]="currentMaterialIndex === 0">
              <mat-icon>chevron_left</mat-icon>
            </button>
            <span class="material-counter">
              {{ currentMaterialIndex + 1 }} / {{ courseData?.course_materials?.length }}
            </span>
            <button mat-icon-button (click)="nextMaterial()"
                    [disabled]="isLastMaterial()">
              <mat-icon>chevron_right</mat-icon>
            </button>
          </div>
          <div class="material-content" *ngIf="getCurrentMaterial() as material">
            <h3>{{ material.title }}</h3>
            <p>{{ material.content }}</p>
          </div>
        </mat-card-content>
      </mat-card>
    </div>
  </div>
</div>
