<div class="student-list-container">
  <!-- 顶部操作栏 -->
  <div class="header-actions">
    <h1>学员管理</h1>
    <button mat-raised-button color="primary" (click)="addStudent()">
      <mat-icon>add</mat-icon>
      新增学员
    </button>
  </div>

  <!-- 筛选区域 -->
  <mat-card class="filter-card">
    <mat-card-content>
      <div class="filter-row">
        <mat-form-field appearance="outline" class="search-field">
          <mat-label>搜索</mat-label>
          <input matInput [(ngModel)]="searchKeyword" placeholder="姓名、学校、年级" />
          <mat-icon matPrefix>search</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>状态</mat-label>
          <mat-select [(ngModel)]="statusFilter">
            <mat-option value="all">全部</mat-option>
            <mat-option value="在读">在读</mat-option>
            <mat-option value="休学">休学</mat-option>
            <mat-option value="毕业">毕业</mat-option>
            <mat-option value="退学">退学</mat-option>
            <mat-option value="转校">转校</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>性别</mat-label>
          <mat-select [(ngModel)]="genderFilter">
            <mat-option value="all">全部</mat-option>
            <mat-option value="male">男</mat-option>
            <mat-option value="female">女</mat-option>
          </mat-select>
        </mat-form-field>

        <div class="filter-buttons">
          <button mat-flat-button color="primary" (click)="applyFilters()">
            <mat-icon>filter_list</mat-icon>
            筛选
          </button>
          <button mat-stroked-button (click)="clearFilters()">
            <mat-icon>clear</mat-icon>
            重置
          </button>
        </div>
      </div>
    </mat-card-content>
  </mat-card>

  <!-- 数据表格 -->
  <mat-card class="table-card">
    <mat-card-content>
      <!-- 加载状态 -->
      <div *ngIf="loading" class="loading-container">
        <mat-progress-bar mode="indeterminate"></mat-progress-bar>
        <p>加载中...</p>
      </div>

      <!-- 错误提示 -->
      <div *ngIf="error && !loading" class="error-message">
        <mat-icon color="warn">error</mat-icon>
        <span>{{ error }}</span>
      </div>

      <!-- 数据表格 -->
      <div *ngIf="!loading && !error" class="table-container">
        <table mat-table [dataSource]="students" matSort class="student-table">
          <!-- 头像列 -->
          <ng-container matColumnDef="avatar">
            <th mat-header-cell *matHeaderCellDef>头像</th>
            <td mat-cell *matCellDef="let student">
              <img
                *ngIf="student.avatarUrl; else defaultAvatar"
                [src]="student.avatarUrl"
                [alt]="student.name"
                class="avatar"
              />
              <ng-template #defaultAvatar>
                <div class="avatar-placeholder">
                  <mat-icon>person</mat-icon>
                </div>
              </ng-template>
            </td>
          </ng-container>

          <!-- 姓名 -->
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>姓名</th>
            <td mat-cell *matCellDef="let student">{{ student.name }}</td>
          </ng-container>

          <!-- 性别 -->
          <ng-container matColumnDef="gender">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>性别</th>
            <td mat-cell *matCellDef="let student">
              <mat-chip-set>
                <mat-chip color="primary" *ngIf="student.gender === 'male'">
                  <mat-icon>male</mat-icon>
                  男
                </mat-chip>
                <mat-chip color="accent" *ngIf="student.gender === 'female'">
                  <mat-icon>female</mat-icon>
                  女
                </mat-chip>
              </mat-chip-set>
            </td>
          </ng-container>

          <!-- 年级 -->
          <ng-container matColumnDef="grade">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>年级</th>
            <td mat-cell *matCellDef="let student">{{ student.grade || '-' }}</td>
          </ng-container>

          <!-- 学校 -->
          <ng-container matColumnDef="school">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>学校</th>
            <td mat-cell *matCellDef="let student">{{ student.school || '-' }}</td>
          </ng-container>

          <!-- 状态 -->
          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>状态</th>
            <td mat-cell *matCellDef="let student">
              <mat-chip-set>
                <!-- eslint-disable-next-line @typescript-eslint/no-unsafe-member-access -->
                <mat-chip [color]="getStatusColor(student.status)">
                  {{ getStatusLabel(student.status) }}
                </mat-chip>
              </mat-chip-set>
            </td>
          </ng-container>

          <!-- 剩余课时 -->
          <ng-container matColumnDef="remainingHours">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>剩余课时</th>
            <td mat-cell *matCellDef="let student">
              <span [class.low-balance]="student.remainingHours < 20">
                {{ student.remainingHours }}
              </span>
              <mat-icon
                *ngIf="student.remainingHours < 20"
                color="warn"
                matTooltip="课时不足，请及时续费"
              >
                warning
              </mat-icon>
            </td>
          </ng-container>

          <!-- 操作列 -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>操作</th>
            <td mat-cell *matCellDef="let student">
              <button mat-icon-button color="primary" (click)="viewDetail(student)" matTooltip="查看详情">
                <mat-icon>visibility</mat-icon>
              </button>
              <button mat-icon-button color="accent" (click)="editStudent(student)" matTooltip="编辑">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="deleteStudent(student)" matTooltip="删除">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns" class="student-row"></tr>
        </table>

        <!-- 分页器 -->
        <mat-paginator
          [pageSizeOptions]="[10, 20, 50]"
          showFirstLastButtons
          aria-label="选择页面"
        >
        </mat-paginator>
      </div>
    </mat-card-content>
  </mat-card>
</div>
