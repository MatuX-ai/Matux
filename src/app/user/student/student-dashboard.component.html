<div class="student-dashboard">
  <div class="page-header">
    <h1 class="page-title">学习仪表板</h1>
    <button mat-stroked-button (click)="openLayoutDialog()" matTooltip="自定义仪表盘布局">
      <mat-icon>dashboard_customize</mat-icon>
      布局
    </button>
  </div>

  <!-- 【一级】欢迎区域 -->
  <div class="welcome-section section-primary fade-in" @fadeInUp *ngIf="layout.isVisible('welcome')">
    <div class="welcome-header">
      <div class="welcome-greeting">
        <h1 class="welcome-title">你好，{{ currentUser?.username || '同学' }} 👋</h1>
        <p class="welcome-date">{{ currentDate }}</p>
      </div>
    </div>

    <!-- 精简快捷入口（仅保留2个核心入口，与菜单不重复）-->
    <div class="quick-entry-grid">
      <mat-card class="quick-entry-card" (click)="navigateTo(ROUTES.USER.COURSES)">
        <div class="quick-entry-icon" style="background: var(--gradient-blue)">
          <mat-icon>auto_awesome</mat-icon>
        </div>
        <span class="quick-entry-label">继续学习</span>
      </mat-card>

      <mat-card class="quick-entry-card" (click)="navigateTo('/ai-edu')">
        <div class="quick-entry-icon" style="background: var(--gradient-green)">
          <mat-icon>smart_toy</mat-icon>
        </div>
        <span class="quick-entry-label">AI 编程</span>
      </mat-card>
    </div>
  </div>

  <!-- 【二级】智能推荐区 -->
  <div class="dual-section fade-in section-secondary" *ngIf="layout.isVisible('recommend')">
    <div class="ai-recommend-section">
      <h2 class="section-title">
        <mat-icon>auto_awesome</mat-icon>
        AI 推荐项目
      </h2>
      <div class="ai-recommend-grid">
        <mat-card
          *ngFor="let rec of aiRecommendations"
          class="ai-recommend-card"
          [style.background]="rec.gradient"
        >
          <mat-card-content>
            <h3 class="recommend-title">{{ rec.title }}</h3>
            <p class="recommend-desc">{{ rec.description }}</p>
            <button mat-stroked-button class="recommend-btn">
              <mat-icon>play_arrow</mat-icon>
              开始实验
            </button>
          </mat-card-content>
        </mat-card>
      </div>
    </div>

    <div class="quick-tools-section">
      <h2 class="section-title">
        <mat-icon>apps</mat-icon>
        快捷工具
      </h2>
      <!-- 常用工具改为紧凑的横排布局 -->
      <div class="quick-tools-compact">
        <div *ngFor="let tool of quickTools" class="quick-tool-chip" [matTooltip]="tool.label">
          <div class="quick-tool-icon-wrapper" [style.background]="tool.color + '20'" [style.color]="tool.color">
            <mat-icon>{{ tool.icon }}</mat-icon>
          </div>
        </div>
      </div>
      <!-- 快捷操作入口 -->
      <div class="quick-actions-list">
        <button mat-stroked-button class="quick-action-btn" (click)="navigateTo(ROUTES.USER.ACHIEVEMENTS)">
          <mat-icon>emoji_events</mat-icon>
          成就系统
        </button>
        <button mat-stroked-button class="quick-action-btn" (click)="navigateTo(ROUTES.USER.GROWTH_TRAJECTORY)">
          <mat-icon>trending_up</mat-icon>
          成长轨迹
        </button>
        <button mat-stroked-button class="quick-action-btn" (click)="navigateTo(ROUTES.USER.REPORTS)">
          <mat-icon>assessment</mat-icon>
          学习报告
        </button>
      </div>
    </div>
  </div>
</div>
