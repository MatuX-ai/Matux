<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- 机器人头部轮廓 -->
  <rect x="50" y="40" width="100" height="90" rx="15" fill="#2c3e50"/>

  <!-- 面部区域 -->
  <rect x="60" y="50" width="80" height="70" rx="10" fill="#ecf0f1"/>

  <!-- 眼睛 -->
  <circle cx="85" cy="75" r="8" fill="#34495e"/>
  <circle cx="115" cy="75" r="8" fill="#34495e"/>

  <!-- 嘴巴 -->
  <rect x="85" y="95" width="30" height="6" rx="3" fill="#34495e"/>

  <!-- 头部两侧 -->
  <rect x="35" y="55" width="15" height="30" rx="5" fill="#2c3e50"/>
  <rect x="150" y="55" width="15" height="30" rx="5" fill="#2c3e50"/>

  <!-- 天线 -->
  <rect x="95" y="20" width="10" height="25" fill="#2c3e50"/>
  <circle cx="100" cy="15" r="10" fill="#3498db"/>

  <!-- 身体 -->
  <rect x="60" y="135" width="80" height="50" rx="10" fill="#2c3e50"/>
  <rect x="70" y="145" width="60" height="30" rx="5" fill="#ecf0f1"/>
</svg>
