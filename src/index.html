<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>iMatuProject Design System</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="assets/branding/logo.svg" />

    <!-- PWA 配置 - 临时注释，等待图标文件生成 -->
    <!-- <link rel="manifest" href="manifest.webmanifest"> -->
    <meta name="theme-color" content="#1976d2" />
    <meta name="description" content="iMatuProject 教育平台 - 支持离线学习的现代化教育系统" />

    <!-- iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="iMatu 离线版" />

    <!-- Windows -->
    <meta name="msapplication-TileColor" content="#1976d2" />
    <link rel="apple-touch-icon" href="assets/branding/logo.svg" />

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />

    <!-- Remix Icon (国内开源图标库) -->
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"
      rel="stylesheet"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Geist Fonts (与原型站一致) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
