# SonarQube前端项目配置
# =============================================================================

# 项目基本信息
sonar.projectKey=imatuproject-frontend
sonar.projectName=iMatu前端应用
sonar.projectVersion=1.0.0

# 源码路径
sonar.sources=src
sonar.tests=src

# TypeScript配置
sonar.typescript.tsconfigPath=tsconfig.json
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tslint.configPath=tslint.json
sonar.typescript.eslint.reportPaths=eslint-report.json

# SCSS/CSS配置
sonar.css.stylelint.reportPaths=stylelint-report.json
sonar.css.file.suffixes=.css,.scss,.sass,.less

# JavaScript配置
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.eslint.reportPaths=eslint-report.json

# 排除配置
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/.angular/**,\
  **/coverage/**,\
  **/*.min.js,\
  **/*.min.css,\
  **/*.bundle.js,\
  **/*.bundle.css,\
  **/environments/environment.*.ts,\
  **/*.d.ts,\
  **/polyfills.ts,\
  **/test.ts,\
  **/*.spec.ts,\
  **/*.mock.ts,\
  **/vendor/**,\
  **/assets/**,\
  **/styles/themes/**

# 包含文件
sonar.inclusions=\
  **/*.ts,\
  **/*.tsx,\
  **/*.js,\
  **/*.jsx,\
  **/*.scss,\
  **/*.css,\
  **/*.html

# 测试文件标识
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.spec.js,**/*.test.js

# 复杂度配置
sonar.typescript.complexity.maximum=10
sonar.javascript.complexity.maximum=10

# 代码重复检测
sonar.cpd.exclusions=**/*.module.ts,**/routing/**,**/constants/**

# Angular特定配置
sonar.angular.aot.enabled=true
sonar.angular.lazy.modules=**/lazy/*.module.ts

# 构建产物分析
sonar.buildbreaker.queryInterval=5000
sonar.buildbreaker.queryMaxAttempts=60

# 自定义指标
sonar.metrics.custom.angularComponents=**/*.component.ts
sonar.metrics.custom.angularServices=**/*.service.ts
sonar.metrics.custom.angularPipes=**/*.pipe.ts

# 分析参数
sonar.sourceEncoding=UTF-8
sonar.verbose=false
