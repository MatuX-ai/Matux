# SonarQube项目配置文件 - iMatu教育平台
# =============================================================================

# 项目基本信息
sonar.projectKey=imatuproject-full
sonar.projectName=iMatu教育平台
sonar.projectVersion=1.0.0

# 项目描述
sonar.projectDescription=基于微服务架构的现代化教育平台，包含AI代码生成、智能推荐、区块链积分系统等功能模块

# 源码和测试代码路径
sonar.sources=src,backend,flutter,sdk,blockchain,hardware,mobile_wallet_sdk
sonar.tests=tests,backend/tests,src/**/*.spec.ts,src/**/*.test.ts

# 语言配置
sonar.language=multi

# 编码格式
sonar.sourceEncoding=UTF-8

# 排除文件和目录
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/.angular/**,\
  **/coverage/**,\
  **/*.min.js,\
  **/*.min.css,\
  **/*.bundle.js,\
  **/*.bundle.css,\
  **/venv/**,\
  **/.venv/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/*.pyo,\
  **/.git/**,\
  **/.idea/**,\
  **/.vscode/**,\
  **/docs_backup/**,\
  **/converted_models/**,\
  **/redis.zip,\
  **/*.log,\
  **/backtest_reports/**,\
  **/validation_reports/**,\
  **/integration_test_results/**,\
  **/sample_*.pkl,\
  **/sample_*.csv,\
  **/test_users.*

# 包含文件（用于覆盖排除规则）
sonar.inclusions=\
  **/*.ts,\
  **/*.tsx,\
  **/*.js,\
  **/*.jsx,\
  **/*.py,\
  **/*.go,\
  **/*.sol,\
  **/*.rs,\
  **/*.dart,\
  **/*.cpp,\
  **/*.c,\
  **/*.h,\
  **/*.hpp,\
  **/*.scss,\
  **/*.css,\
  **/*.html,\
  **/*.json,\
  **/*.yaml,\
  **/*.yml

# 测试覆盖率配置
# Python覆盖率报告
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.python.xunit.reportPath=backend/test-results.xml

# TypeScript覆盖率报告
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Dart覆盖率报告
sonar.dart.coverage.reportPaths=flutter/coverage/lcov.info

# 代码重复检测配置
sonar.cpd.exclusions=\
  **/migrations/**,\
  **/alembic/versions/**,\
  **/*.pb.go,\
  **/generated/**,\
  **/protobuf/**

# 复杂度阈值配置
sonar.cyclomaticComplexity.threshold=10
sonar.cognitiveComplexity.threshold=15

# 安全热点配置
sonar.security.config.javaAudit=security/java-audit.json
sonar.security.config.phpSecurityAudit=security/php-security-audit.json

# 自定义指标
sonar.metrics.custom.1.key=custom_lines_of_code
sonar.metrics.custom.1.name=自定义代码行数
sonar.metrics.custom.1.description=排除特定文件后的有效代码行数

# 分支分析
sonar.branch.name=main
sonar.branch.target=main

# Pull Request分析
sonar.pullrequest.provider=github
sonar.pullrequest.github.repository=iMatu/iMatuProject

# 质量门禁等待
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# 并行处理配置
sonar.scanner.parallel.enabled=true
sonar.scanner.parallel.threads=4

# 日志级别
sonar.log.level=INFO

# HTTP配置（如果需要代理）
# sonar.host.url=http://your-sonarqube-server:9000
# sonar.login=your-authentication-token

# SCM信息
sonar.scm.enabled=true
sonar.scm.provider=git

# 文件大小限制（MB）
sonar.filesize.limit=20

# 分析超时设置（秒）
sonar.analysis.timeout=3600

# 内存配置
sonar.ce.javaOpts=-Xmx2g
